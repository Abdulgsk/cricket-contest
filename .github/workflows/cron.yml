name: Scheduled cron pings

# Free replacement for Vercel Pro crons. Hits our protected cron endpoints
# every 5 minutes so match reminders fire on Hobby.
#
# Setup once:
#   1. In repo Settings -> Secrets and variables -> Actions, add:
#        CRON_SECRET   = same value as the env var on Vercel
#        APP_BASE_URL  = https://cricket-contest.vercel.app  (no trailing slash)
#   2. Commit this file. Workflow shows up under the Actions tab.
#
# Note: GitHub's scheduler is best-effort; ticks can drift a few minutes
# under load. Good enough for 30/20/10-min reminders.
#
# Contest auto-mapping is NOT cron-driven — it runs lazily inside
# autoUpdateMatchStatuses() on every protected page render, same pattern
# as the upcoming→live match status flip.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: cron-pings
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Match reminders
        run: |
          curl -sS -m 60 -o /dev/null -w "reminders: %{http_code}\n" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_BASE_URL }}/api/cron/match-reminders"
